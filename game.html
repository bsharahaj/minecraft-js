<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft 2D</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="game-body">

  <div id="game-screen">

    <!-- LEFT DOCK: controls float over the world -->
    <aside id="dock">
      <div class="dock-group">
        <a href="index.html" class="dock-btn system" title="Home">🏠</a>
        <button id="reset-btn" class="dock-btn system" title="Reset World">↻</button>
      </div>

      <div class="dock-group">
        <div class="tool dock-btn" data-tool="axe" title="Axe — chops trees">
          <img src="assets/textures/tool-axe.png" alt="Axe">
        </div>
        <div class="tool dock-btn" data-tool="pickaxe" title="Pickaxe — mines rock & ore">
          <img src="assets/textures/tool-pickaxe.png" alt="Pickaxe">
        </div>
        <div class="tool dock-btn" data-tool="shovel" title="Shovel — digs dirt & sand">
          <img src="assets/textures/tool-shovel.png" alt="Shovel">
        </div>
      </div>

      <!-- ▼▼▼ NEW: biome switcher ▼▼▼ -->
      <div class="dock-group">
        <button class="biome-btn selected" data-biome="forest" title="Forest">🌲</button>
        <button class="biome-btn" data-biome="desert" title="Desert">🌵</button>
        <button class="biome-btn" data-biome="snow" title="Snow">❄️</button>
        <button class="biome-btn" data-biome="cave" title="Cave">🕳️</button>
      </div>
      <!-- ▲▲▲ NEW ▲▲▲ -->

      <div class="dock-group">
        <div id="inv-toggle" class="dock-btn" title="Inventory">
          <img src="assets/textures/tool-chest.png" alt="Inventory">
        </div>
      </div>
    </aside>

    <!-- WORLD: fills the screen -->
    <main id="world-wrap">
      <div id="game-bg"></div>
      <div id="world"></div>
    </main>

    <!-- INVENTORY PANEL: toggled by the chest -->
    <div id="inventory" class="hidden">
      <h3>Inventory</h3>
      <div id="inventory-items"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
