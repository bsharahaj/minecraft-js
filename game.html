<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft 2D</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Minecraft 2D</h1>

  <!-- Toolbar: 3 tools. data-tool tells JS which tool this is -->
  <div id="toolbar">
    <div class="tool" data-tool="axe">🪓 Axe</div>
    <div class="tool" data-tool="pickaxe">⛏️ Pickaxe</div>
    <div class="tool" data-tool="shovel">🥄 Shovel</div>
  </div>

  <!-- World: stays EMPTY. JavaScript fills this with tiles -->
  <div id="world"></div>

  <!-- Inventory: label stays, JS only touches #inventory-items -->
  <div id="inventory">
    <h3>Inventory</h3>
    <div id="inventory-items"></div>
  </div>

  <!-- Mandatory reset button -->
  <button id="reset-btn">Reset World</button>

  <!-- Script loads LAST so all elements exist first -->
  <script src="script.js"></script>

</body>
</html>
